# =============================================================================
# Zo-rPizza - Render Blueprint
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # BACKEND (Express + Prisma)
  # rootDir: backend — barcha commandlar backend/ papkasidan ishlaydi
  # ---------------------------------------------------------------------------
  - type: web
    name: zo-rpizza-backend
    plan: free
    runtime: node
    rootDir: backend
    buildFilter:
      paths:
        - backend/**

    buildCommand: pnpm install
    startCommand: pnpm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      # Render Dashboard > Environment da qo'shing:
      # DATABASE_URL   — Supabase Transaction pooler (port 6543)
      # DIRECT_URL     — Supabase Direct (port 5432)
      # FRONTEND_URLS  — https://zo-r-pizza.vercel.app
      # SUPABASE_URL   — https://pzvzksrphyjsxlfkebic.supabase.co
      # SUPABASE_SERVICE_ROLE_KEY — sb_secret_...
