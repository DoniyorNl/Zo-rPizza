name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */5 * *'  # Har 5 kunda soat 9:00 UTC
  workflow_dispatch:         # Qo'lda ham ishlatish mumkin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -f https://zorpizza.vercel.app/api/health
          echo "✅ Supabase pinged successfully"
